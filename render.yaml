services:
  - type: web
    name: midyaf
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: echo 'CREATE SCHEMA IF NOT EXISTS "midyaf";' | npx prisma db execute --stdin --url="$DATABASE_URL" && export DATABASE_URL=$(node -e "console.log(process.env.DATABASE_URL.includes('?') ? process.env.DATABASE_URL + '&schema=midyaf' : process.env.DATABASE_URL + '?schema=midyaf')") && npx prisma db push --accept-data-loss && npx prisma db seed && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: CLIENT_ORIGIN
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: riyada-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: ENABLE_CITY
        value: "true"
      - key: DEFAULT_CITY
        value: riyadh
      - key: COMMISSION_DEFAULT_PERCENT
        value: "12"
      - key: VITE_API_BASE_URL
        value: /api
